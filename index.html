    </style>
    <script>
      // Cache-buster: runs BEFORE any SW can intercept
      // Kills all service workers and caches on first load after deploy
      (function() {
        var BUILD_ID = '__BUILD__';
        var stored = localStorage.getItem('cc_build');
        if (stored !== BUILD_ID) {
          localStorage.setItem('cc_build', BUILD_ID);
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }
          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(k) { caches.delete(k); });
            });
          }
          if (stored !== null) {
            // Not first visit, was a different build — force reload
            setTimeout(function() { location.reload(true); }, 200);
          }
        }
      })();
    </script>
